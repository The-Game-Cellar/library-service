server:
  port: ${LIBRARY_SERVICE_PORT:8082}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: false

spring:
  application:
    name: library-service
  datasource:
    # IPv4 loopback in the default so Windows + Docker Desktop devs are not
    # bitten by the wslrelay IPv6 quirk where `::1` is bound but refuses
    # connections. Real deployments set LIBRARY_DB_URL explicitly.
    url: ${LIBRARY_DB_URL:jdbc:postgresql://127.0.0.1:5433/library_db}
    username: ${LIBRARY_DB_USERNAME:postgres}
    password: ${LIBRARY_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-disabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/game-cellar}

game-service:
  url: ${GAME_SERVICE_URL:http://localhost:8081}
  connect-timeout: ${GAME_SERVICE_CONNECT_TIMEOUT:2000}
  read-timeout: ${GAME_SERVICE_READ_TIMEOUT:5000}

security:
  internal:
    token: ${INTERNAL_SERVICE_TOKEN:}

logging:
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr([%X{requestId:-........}]){magenta} %clr([%-15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"